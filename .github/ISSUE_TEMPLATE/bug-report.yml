name: Bug report
description: Report a reproducible problem with the package or example app.
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include steps, configuration, and sample code when possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node.js version, Angular version, OS, and anything else relevant.
